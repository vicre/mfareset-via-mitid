<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Home</title>
</head>
<body>
    <h1>Hello world</h1>

    {% if user.is_authenticated %}
        <p>Logged in as {{ user.username }}</p>
        <p><a href="{% url 'profile' %}">See CAS profile</a></p>
        <p><a href="{% url 'cas_ng_logout' %}">Logout</a></p>
    {% else %}
        <p><a href="{% url 'cas_ng_login' %}">Login with CAS</a></p>
    {% endif %}
</body>
</html>
